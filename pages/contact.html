<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Myntra</title>

    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/contact.css">

    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>

<body>

<header>

    <div class="logo_container">
        <a href="../index.html">
            <img class="myntra_home" src="../images/myntra logo.avif" alt="">
        </a>
    </div>

    <nav class="nav_bar">
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Kids</a>
        <a href="#">Home & Living</a>
        <a href="#">Beauty</a>
        <a href="#">Studio <sup>NEW</sup></a>
    </nav>

    <div class="action_bar">

        <div class="action_container" id="theme-toggle">
            <span class="material-symbols-outlined action_icon">
                dark_mode
            </span>
            <span class="action_name">Theme</span>
        </div>

        <a class="action_container" href="profile.html">
            <span class="material-symbols-outlined action_icon">
                person
            </span>
            <span class="action_name">Profile</span>
        </a>

        <a class="action_container" href="wishlist.html">
            <span class="material-symbols-outlined action_icon">
                favorite
            </span>
            <span class="action_name">Wishlist</span>
            <span class="wishlist-item-count">0</span>
        </a>

        <a class="action_container" href="bag.html">
            <span class="material-symbols-outlined action_icon">
                shopping_bag
            </span>
            <span class="action_name">Bag</span>
            <span class="bag-item-count">0</span>
        </a>

    </div>

</header>

<main>

<div class="contact-container">

    <div class="contact-card">

        <h1>Contact Us</h1>

        <div class="contact-info">

            <p>📧 <strong>Email:</strong> shivpal@example.com</p>

            <p>📞 <strong>Phone:</strong> +91 7607812407</p>

            <p>📍 <strong>Location:</strong> Gorakhpur, Uttar Pradesh</p>

        </div>

        <form id="contact-form">

            <input
                type="text"
                id="name"
                placeholder="Your Name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Your Email"
                required>

            <textarea
                id="message"
                rows="5"
                placeholder="Your Message"
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</div>

</main>

<script src="../scripts/common.js"></script>
<script src="../scripts/contact.js"></script>

</body>
</html>
