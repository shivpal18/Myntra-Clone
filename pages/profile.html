<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Myntra</title>

    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/profile.css">

    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
</head>

<body>

    <header>
        <div class="logo_container">
            <a href="../index.html"><img class="myntra_home" src="../images/myntra logo.avif" alt="Myntra Home"></a>
        </div>
        <nav class="nav_bar">
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
            <a href="#">Home & Living</a>
            <a href="#">Beauty</a>
            <a href="#">Studio <sup>New</sup></a>
        </nav>

        <div class="action_bar">
            <div class="action_container" id="theme-toggle">
                <span class="material-symbols-outlined action_icon">dark_mode</span>
                <span class="action_name">Theme</span>
            </div>

            <a class="action_container" href="wishlist.html">
                <span class="material-symbols-outlined action_icon">favorite</span>
                <span class="action_name">Wishlist</span>
                <span class="wishlist-item-count">0</span>
            </a>

            <a class="action_container" href="bag.html">
                <span class="material-symbols-outlined action_icon">shopping_bag</span>
                <span class="action_name">Bag</span>
                <span class="bag-item-count">0</span>
            </a>
        </div>
    </header>

<main>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-image">
                <img
                    id="profile-photo"
                    src="../images/default-profile.png"
                    alt="Profile Photo">

                <label for="photo-upload" class="camera-btn">
                    📷
                </label>

                <input
                    type="file"
                    id="photo-upload"
                    accept="image/*">

            </div>
            <h2 id="profile-name">Shivpal Chaurasiya</h2>
            <p id="profile-email">shivpal@example.com</p>
            <div class="profile-info">
                <div class="info-box">
                    <h3>🛍️ Bag Items</h3>
                    <p id="bag-count">0</p>
                </div>

                <div class="info-box">
                    <h3>❤️ Wishlist</h3>
                    <p id="wishlist-count">0</p>
                </div>
            </div>
            <button id="edit-profile-btn">
                Edit Profile
            </button>

            <button id="address-btn">
                Saved Address
            </button>

            <div class="saved-address-card">
                <h3>📍 Saved Address</h3>
                <p id="saved-address-text">
                    No Address Added
                </p>
                <button id="edit-address-btn">
                    ✏️ Edit Address
                </button>
            </div>
            
        </div>
    </div>

    <div class="edit-profile-modal" id="edit-profile-modal">
        <div class="edit-profile-box">
            <h2>Edit Profile</h2>
            <input
                type="text"
                id="edit-name"
                placeholder="Enter Name">

            <input
                type="email"
                id="edit-email"
                placeholder="Enter Email">

            <input
                type="text"
                id="edit-phone"
                placeholder="Enter Phone Number">

            <div class="profile-btns">
                <button id="save-profile">
                    Save
                </button>
                <button id="close-profile">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <div class="address-modal" id="address-modal">
        <div class="address-box">
            <h2>Saved Address</h2>
            <input type="text" id="full-name" placeholder="Full Name">
            <input type="text" id="phone-number" placeholder="Phone Number">
            <input type="text" id="house-number" placeholder="House No. / Flat">
            <input type="text" id="street" placeholder="Street / Area">
            <input type="text" id="city" placeholder="City">
            <input type="text" id="state" placeholder="State">
            <input type="text" id="pincode" placeholder="Pincode">
            <div class="profile-btns">
                <button id="save-address">
                    Save Address
                </button>
                <button id="close-address">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</main>

<script src="../scripts/common.js"></script>
<script src="../scripts/profile.js"></script>

</body>
</html>
